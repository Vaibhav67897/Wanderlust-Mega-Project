replicaCount: 1

image:
  repository: trainwithshubham/wanderlust-frontend-beta
  tag: v2.2
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 5173
  targetPort: 5173
  nodePort: 31000

labels:
  app: frontend

serviceAccount:
  create: false

ingress:
  enabled: false


  #autoscaling:
  #enabled: false


resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi


autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50


